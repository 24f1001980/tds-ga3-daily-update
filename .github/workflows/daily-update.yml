name: Daily Repository Update

on:
  schedule:
    - cron: '0 2 * * *'   # Runs daily at 2:00 AM UTC
  workflow_dispatch:      # Allows manual run for testing

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Daily commit by 24f1001980@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date)" > daily-log.txt
          git config user.name "github-actions"
          git config user.email "24f1001980@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily update"
          git push
